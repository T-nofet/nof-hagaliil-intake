<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>טופס קליטה - נוף הגליל</title>
    <style>
        body { font-family: Arial; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; background: #fff; margin: auto; padding: 20px; border-radius: 8px; }
        canvas { border: 1px solid #ccc; width: 100%; height: 150px; }
        button { width: 100%; padding: 10px; background: #2ecc71; color: white; border: none; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <form id="mainForm">
        <input type="text" id="studentName" placeholder="שם מלא" required><br><br>
        <input type="text" id="studentId" placeholder="תעודת זהות" required><br><br>
        <input type="text" id="parentPhone" placeholder="טלפון הורה" required><br><br>
        <input type="email" id="parentEmail" placeholder="אימייל הורה" required><br><br>
        <input type="text" id="address" placeholder="כתובת" required><br><br>
        <input type="date" id="formDate" required><br><br>
        <label>חתימת נער:</label>
        <canvas id="studentCanvas"></canvas>
        <label>חתימת הורה:</label>
        <canvas id="parentCanvas"></canvas>
        <button type="submit" id="submitBtn">שלח</button>
    </form>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/XXXXX/exec";
    
    // אתחול קאנבס פשוט
    function setupCanvas(id) {
        const c = document.getElementById(id);
        const ctx = c.getContext('2d');
        c.addEventListener('mousemove', e => { if(e.buttons === 1) ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); });
        c.addEventListener('mousedown', e => ctx.moveTo(e.offsetX, e.offsetY));
    }
    setupCanvas('studentCanvas'); setupCanvas('parentCanvas');

    document.getElementById('mainForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            studentName: document.getElementById('studentName').value,
            studentId: document.getElementById('studentId').value,
            parentPhone: document.getElementById('parentPhone').value,
            parentEmail: document.getElementById('parentEmail').value,
            address: document.getElementById('address').value,
            date: document.getElementById('formDate').value,
            studentSignature: document.getElementById('studentCanvas').toDataURL(),
            parentSignature: document.getElementById('parentCanvas').toDataURL()
        };
        
        try {
            const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(data) });
            alert("נשלח בהצלחה!");
        } catch(err) { alert("שגיאה בשליחה"); }
    });
</script>
</body>
</html>
